name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # Windows Authenticode via Azure Trusted Signing has to run on a Windows
  # runner — both dotnet/sign and Azure/artifact-signing-action are
  # Windows-only. The OSS `prebuilt` builder is GoReleaser Pro, so instead
  # of handing the signed exes to goreleaser this job produces the final
  # release zips (matching goreleaser's name_template) plus a sha256
  # fragment. The publish job merges them into dist/ and appends the
  # fragment to checksums.txt.
  sign-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25"

      # Duplicates the `ana-unix` ldflags in .goreleaser.yml. They need to
      # stay in sync — both jobs encode the same version/commit/date into
      # the binary.
      - name: Cross-build windows binaries
        shell: bash
        env:
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          commit="$GITHUB_SHA"
          date="$(date -u +%FT%TZ)"
          ldflags="-s -w -X main.version=${version} -X main.commit=${commit} -X main.date=${date}"

          for arch in amd64 arm64; do
            out="windows-signed/windows_${arch}"
            mkdir -p "$out"
            GOOS=windows GOARCH="$arch" go build \
              -ldflags "$ldflags" \
              -o "$out/ana.exe" \
              ./cmd/ana
          done

      - name: Azure Trusted Signing
        uses: Azure/artifact-signing-action@b443cf8ea4124818d2ea9f043cba29fc3ec47b16 # v1.2.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: https://eus.codesigning.azure.net/
          trusted-signing-account-name: tooling-and-automation
          certificate-profile-name: Elevate
          files-folder: windows-signed
          files-folder-filter: exe
          files-folder-recurse: true
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Archive signed binaries
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          mkdir -p windows-dist
          for arch in amd64 arm64; do
            stage="stage-${arch}"
            mkdir -p "$stage"
            cp "windows-signed/windows_${arch}/ana.exe" "$stage/ana.exe"
            cp LICENSE "$stage/LICENSE"
            cp README.md "$stage/README.md"
            zip_name="ana_${version}_windows_${arch}.zip"
            (cd "$stage" && 7z a -tzip -mx=9 "../windows-dist/${zip_name}" ana.exe LICENSE README.md >/dev/null)
          done

          (
            cd windows-dist
            for zip in *.zip; do
              sha256sum "$zip"
            done
          ) > windows-dist/windows-checksums.txt

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-dist
          path: windows-dist/
          retention-days: 1
          if-no-files-found: error

  # macOS + Linux build, Apple codesign, notarize. Runs in parallel with
  # sign-windows. Uploads its dist/ directory for the publish job to merge.
  build-unix:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25"

      - name: Install syft for SBOM generation
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      # Import the Apple Developer ID into a throwaway keychain so codesign
      # can find it. partition-list must be set or codesign prompts for the
      # key and hangs on a headless runner.
      - name: Import Apple Developer ID
        env:
          APPLE_DISTRIBUTION_PKCS12: ${{ secrets.APPLE_DISTRIBUTION_PKCS12 }}
          APPLE_DISTRIBUTION_PKCS12_PASSPHRASE: ${{ secrets.APPLE_DISTRIBUTION_PKCS12_PASSPHRASE }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/ana-release.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          CERT_PATH="$RUNNER_TEMP/apple-dist.p12"

          printf '%s' "$APPLE_DISTRIBUTION_PKCS12" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$CERT_PATH" -k "$KEYCHAIN" \
            -P "$APPLE_DISTRIBUTION_PKCS12_PASSPHRASE" \
            -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" "$(security list-keychains -d user | tr -d '"')"

          rm -f "$CERT_PATH"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@e24998b8b67b290c2fa8b7c14fcfa7de2c5c9b8c # v7.1.0
        with:
          distribution: goreleaser
          version: "~> v2"
          # --skip=publish so archives exist on disk for the notarize step
          # before they're uploaded.
          args: release --clean --skip=publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notarize darwin archives
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          for archive in dist/*darwin*.tar.gz; do
            echo "notarizing: $archive"
            .github/scripts/notarize-archive.sh "$archive"
          done

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: unix-dist
          path: dist/
          retention-days: 1
          if-no-files-found: error

  # Merge windows + unix artifacts and upload to the release. Tiny ubuntu
  # job — no signing, no codesigning, just tar/zip/sha256/gh cli.
  publish:
    needs: [sign-windows, build-unix]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: unix-dist
          path: dist

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: windows-dist
          path: windows-dist

      # Merge windows zips into dist/ and append their sha256 lines to the
      # goreleaser-generated checksums.txt so install.sh's single-file
      # verification flow keeps working for the .tar.gz path and any future
      # windows installer can use the same manifest.
      - name: Merge windows artifacts into dist
        run: |
          set -euo pipefail
          mv windows-dist/*.zip dist/
          cat windows-dist/windows-checksums.txt >> dist/checksums.txt

      - name: Publish release artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          artifacts=(
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
            dist/*.sbom.json
          )
          if [[ ${#artifacts[@]} -eq 0 ]]; then
            echo "no artifacts in dist/ — upstream jobs likely failed" >&2
            exit 1
          fi
          gh release upload "$GITHUB_REF_NAME" "${artifacts[@]}" --clobber
